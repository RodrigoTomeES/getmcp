name: Sync Official MCP Registry

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6:00 UTC
  workflow_dispatch: {}

concurrency:
  group: sync-registry
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build -w @getmcp/core

      - name: Run sync pipeline
        run: npx tsx packages/registry/scripts/sync.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PULSEMCP_API_KEY: ${{ secrets.PULSEMCP_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/registry/data/
          git diff --staged --quiet || git commit -m "chore(registry): daily sync [skip ci]"
          git push
